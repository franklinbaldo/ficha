name: Preserve Roundtrip Decision Evidence

on:
  pull_request:
    paths:
      - '.github/workflows/dispatch-verify-roundtrip-decision.yml'

permissions:
  actions: read
  contents: write

concurrency:
  group: preserve-roundtrip-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preserve:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      SOURCE_RUN_ID: '29709299668'
      TARGET_BRANCH: feat/verify-roundtrip-evidence
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Download raw decision evidence
        run: |
          rm -rf /tmp/roundtrip-evidence
          mkdir -p /tmp/roundtrip-evidence
          for attempt in $(seq 1 12); do
            if gh run download "$SOURCE_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --name "roundtrip-decision-evidence-$SOURCE_RUN_ID" \
              --dir /tmp/roundtrip-evidence; then
              break
            fi
            if (( attempt == 12 )); then
              exit 1
            fi
            delay=$((attempt * 5))
            echo "download attempt $attempt failed; retrying in ${delay}s" >&2
            sleep "$delay"
          done
          source_json=$(find /tmp/roundtrip-evidence -name verify-roundtrip.json -print -quit)
          if [[ -z "$source_json" ]]; then
            echo 'verify-roundtrip.json not found in artifact' >&2
            find /tmp/roundtrip-evidence -maxdepth 3 -type f -print >&2
            exit 1
          fi
          mkdir -p etl/bench/evidence
          cp "$source_json" etl/bench/evidence/2026-07-20-roundtrip-raw.json

      - name: Commit raw evidence
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add etl/bench/evidence/2026-07-20-roundtrip-raw.json
          if git diff --cached --quiet; then
            echo 'raw evidence already preserved'
            exit 0
          fi
          git commit -m 'docs(bench): preserve raw roundtrip decision evidence'
          git push origin HEAD:"$TARGET_BRANCH"
