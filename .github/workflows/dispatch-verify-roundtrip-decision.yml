name: Run Decision-Grade Roundtrip Evidence

on:
  pull_request:
    paths:
      - '.github/workflows/dispatch-verify-roundtrip-decision.yml'

permissions:
  contents: read

concurrency:
  group: roundtrip-decision-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FICHA_THREADS: '1'
      PYTHONUNBUFFERED: '1'
    defaults:
      run:
        shell: bash
        working-directory: etl
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/verify-roundtrip-evidence

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Record provenance
        run: |
          mkdir -p bench/decision-evidence
          {
            echo 'profile=roundtrip-decision'
            echo 'source_branch=feat/verify-roundtrip-evidence'
            echo 'source_sha=3648ca5801ecf4071114fafb24b0a7c08ca8ee27'
            echo 'scale=500000'
            echo 'chunks=10'
            echo 'repeats=5'
            echo 'sample_size=1000'
            echo 'alternation_seed=20260719'
            uname -a
            df -h .
          } | tee bench/decision-evidence/run-metadata.txt

      - name: Generate production-shaped fixture
        run: |
          uv run python - <<'PY' 2>&1 | tee bench/decision-evidence/generate.log
          import sys
          from pathlib import Path

          sys.path.insert(0, 'bench')
          from benchmark import generate

          generate(500000, 10, Path('bench/.work/data'))
          PY

      - name: Run historical-vs-current verifier evidence
        run: |
          uv run python bench/ab_verify_roundtrip.py \
            --repeats 5 \
            --seed 20260719 \
            --sample-size 1000 \
            --json bench/decision-evidence/verify-roundtrip.json \
            2>&1 | tee bench/decision-evidence/verify-roundtrip.log

      - name: Upload decision evidence
        uses: actions/upload-artifact@v4
        with:
          name: roundtrip-decision-evidence-${{ github.run_id }}
          path: etl/bench/decision-evidence/
          if-no-files-found: error
          retention-days: 30
          include-hidden-files: true
