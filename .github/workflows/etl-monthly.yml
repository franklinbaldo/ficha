name: ETL — monthly snapshot

on:
  schedule:
    # 03:00 UTC no dia 5 de cada mês — RFB normalmente publica antes disso.
    - cron: '0 3 5 * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Snapshot alvo (YYYY-MM). Vazio = mês corrente.'
        required: false
        type: string

permissions:
  contents: write  # precisa pra commitar manifest.json atualizado

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # margem dentro do limite de 6h
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv python install 3.11

      - run: uv sync

      - name: Resolve target month
        id: month
        run: |
          MONTH="${{ inputs.month }}"
          if [ -z "$MONTH" ]; then
            MONTH=$(date -u +%Y-%m)
          fi
          echo "value=$MONTH" >> "$GITHUB_OUTPUT"

      - name: Run pipeline
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: uv run ficha-etl run --month ${{ steps.month.outputs.value }}

      - name: Commit updated manifest
        run: |
          cd ..
          # Stage first so we detect both modifications and new files (bootstrap case).
          git add web/public/manifest.json
          if git diff --cached --quiet -- web/public/manifest.json; then
            echo "Manifest unchanged — nothing to commit"
            exit 0
          fi
          git config user.name "ficha-etl-bot"
          git config user.email "ficha-etl-bot@users.noreply.github.com"
          git commit -m "chore(etl): update manifest for ${{ steps.month.outputs.value }}"
          git push origin main
