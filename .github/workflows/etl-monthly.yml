name: ETL — monthly snapshot

on:
  schedule:
    # 03:00 UTC nos dias 5, 10, 15 e 20 — a RFB normalmente publica antes do
    # dia 5, mas não é garantido. Rodar só uma vez por mês significava que
    # uma publicação atrasada só seria pega no cron do mês seguinte (visto
    # em 2026-06/2026-07). Execuções em que a RFB ainda não publicou nada
    # novo terminam como no-op verde (ver "Resolve target month" abaixo),
    # então tentativas extras não têm custo além do runtime do próprio check.
    - cron: '0 3 5,10,15,20 * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Snapshot alvo (YYYY-MM). Vazio = snapshot mais recente disponível no upstream (não necessariamente o mês corrente).'
        required: false
        type: string
      skip_upload:
        description: 'Dry-run local: não faz upload nem publica o manifesto'
        required: false
        type: boolean
        default: false
      no_verify:
        description: 'Desativar roundtrip-equivalence test'
        required: false
        type: boolean
        default: false

permissions:
  contents: write  # precisa pra commitar manifest.json atualizado

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # margem dentro do limite de 6h
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4

      # Os ZIPs da RFB somam ~15 GB extraídos. Ubuntu-latest tem ~14 GB livres
      # por padrão — liberamos espaço removendo ferramentas que não usamos.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/powershell /usr/share/swift \
                      "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          df -h /

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv python install 3.11

      - run: uv sync --frozen

      - name: Resolve target month
        id: month
        working-directory: etl
        # When no month is given by the operator, query the RFB Nextcloud
        # listing and pick the most recent published snapshot. The cron
        # fires at 03:00 UTC on day 5 but RFB sometimes publishes later;
        # defaulting to the calendar month would 404 every byte (see
        # PR #24). Pass user input via env, validate as YYYY-MM before
        # it can reach any command.
        env:
          INPUT_MONTH: ${{ inputs.month }}
          CNPJ_SHARE_TOKEN: ${{ secrets.CNPJ_SHARE_TOKEN }}
        run: |
          if [ -n "$INPUT_MONTH" ]; then
            MONTH="$INPUT_MONTH"
            echo "Using user-provided month: $MONTH"
          else
            # Retry com backoff: os crons de 2026-06 e 2026-07 falharam aqui
            # com saída vazia porque list-snapshots quebrava transitoriamente,
            # o stderr ia pra /dev/null e o `tail` engolia o exit code. Agora
            # o stderr fica no log e falha de verdade é falha do step.
            MONTH=""
            for attempt in 1 2 3; do
              if SNAPSHOTS=$(uv run ficha-etl list-snapshots); then
                MONTH=$(printf '%s\n' "$SNAPSHOTS" | sort | tail -n 1)
                break
              fi
              echo "list-snapshots failed (attempt $attempt/3); retrying in $((attempt * 30))s"
              sleep $((attempt * 30))
            done
            if [ -z "$MONTH" ]; then
              echo "::error::Could not resolve latest snapshot from RFB upstream after 3 attempts — see stderr above (token rotacionado? RFB fora do ar ou bloqueando o runner?)."
              exit 1
            fi
            echo "Latest snapshot on RFB upstream: $MONTH"
          fi
          if ! [[ "$MONTH" =~ ^[0-9]{4}-(0[1-9]|1[0-2])$ ]]; then
            echo "::error::Invalid month '$MONTH' - expected YYYY-MM"
            exit 1
          fi

          # Freshness guard: quando MONTH foi auto-resolvido (sem
          # INPUT_MONTH), distingue três casos comparando com o manifest:
          #   MONTH >  CURRENT → snapshot novo publicado, roda o pipeline.
          #   MONTH == CURRENT → RFB ainda não publicou o próximo. Não é
          #     falha — é o estado normal na maior parte dos 4 disparos/mês
          #     (dias 5/10/15/20). No-op verde com notice; reprocessar o
          #     mesmo mês seria trabalho perdido (parquets determinísticos).
          #     Atraso prolongado de verdade é responsabilidade do freshness
          #     check semanal (etl-smoke.yml), não deste guard.
          #   MONTH <  CURRENT → listagem do upstream regrediu (PROPFIND
          #     parcial) — nunca deve mover a base pra trás. Falha de
          #     verdade. Comparação lexicográfica funciona pra YYYY-MM.
          # Operator-provided INPUT_MONTH sempre roda (backfill é seguro:
          # update_manifest ordena e current aponta pro mais novo).
          SHOULD_RUN=true
          if [ -z "$INPUT_MONTH" ]; then
            CURRENT=$(jq -r '.current // ""' ../web/public/manifest.json 2>/dev/null || echo "")
            if [ -n "$CURRENT" ] && [ "$MONTH" = "$CURRENT" ]; then
              echo "::notice::Nenhum snapshot novo publicado pela RFB ainda (upstream mais recente = manifest atual = $CURRENT). Encerrando sem reprocessar — próxima tentativa automática no próximo disparo do cron."
              SHOULD_RUN=false
            elif [ -n "$CURRENT" ] && ! [[ "$MONTH" > "$CURRENT" ]]; then
              echo "::error::Auto-resolved month '$MONTH' is older than manifest current ($CURRENT) — upstream listing looks incomplete/regressive. Re-rode o smoke; se persistir, investigue o Nextcloud da RFB. Backfill manual: workflow_dispatch com inputs.month."
              exit 1
            fi
            # Lacuna: pular meses intermediários quebra a continuidade
            # histórica dos snapshots. O cron processa só o mais novo;
            # os faltantes precisam de backfill manual.
            if [ "$SHOULD_RUN" = "true" ] && [ -n "$CURRENT" ]; then
              EXPECTED=$(date -d "${CURRENT}-01 +1 month" +%Y-%m)
              if [[ "$MONTH" > "$EXPECTED" ]]; then
                echo "::warning::Gap na série histórica: manifest está em $CURRENT e este run processa $MONTH — os meses intermediários não serão processados automaticamente. Rode etl-monthly via workflow_dispatch com inputs.month pra cada mês faltante (qualquer ordem)."
              fi
            fi
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "value=$MONTH" >> "$GITHUB_OUTPUT"

      # Cache restrito aos ZIPs crus (≤ ~7 GB) — exclui extracted/ (~25-30 GB)
      # que estouraria o limite de 10 GB do GH Actions.
      - name: Cache RFB raw ZIPs
        if: steps.month.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: etl/.cache/${{ steps.month.outputs.value }}/*.zip
          key: rfb-zips-${{ steps.month.outputs.value }}-v1

      - name: Run pipeline
        if: steps.month.outputs.should_run == 'true'
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          CNPJ_SHARE_TOKEN: ${{ secrets.CNPJ_SHARE_TOKEN }}
          MONTH: ${{ steps.month.outputs.value }}
          SKIP_UPLOAD: ${{ inputs.skip_upload }}
          NO_VERIFY: ${{ inputs.no_verify }}
          # Defense against `'ascii' codec can't encode character` crashes
          # when runner stderr defaults to ascii (PR #24, commit 75691a94).
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: |
          EXTRA_ARGS=""
          [ "$SKIP_UPLOAD" = "true" ] && EXTRA_ARGS="$EXTRA_ARGS --skip-upload"
          [ "$NO_VERIFY"   = "true" ] && EXTRA_ARGS="$EXTRA_ARGS --no-verify"
          uv run ficha-etl run --month "$MONTH" $EXTRA_ARGS

      # RFC 0001 §16/19: transform_metrics.json (baseline por estágio, RSS,
      # pico de disco/filesystem, e detalhe por chunk) é o dado mais valioso
      # justamente quando o pipeline falha no meio -- e sem este step ele
      # desaparecia junto com o runner ao fim do job. `always()` roda mesmo
      # com "Run pipeline" falho (é quando as métricas parciais importam
      # mais); `if-no-files-found: warn` evita reprovar o job só porque a
      # falha foi tão cedo que nem o diretório de métricas chegou a existir.
      - name: Upload transform metrics
        if: always() && steps.month.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: transform-metrics-${{ steps.month.outputs.value }}
          path: etl/.cache/${{ steps.month.outputs.value }}/metrics/transform_metrics.json
          if-no-files-found: warn

      - name: Commit updated manifest
        if: >-
          steps.month.outputs.should_run == 'true' &&
          inputs.skip_upload != true
        env:
          MONTH: ${{ steps.month.outputs.value }}
        run: |
          cd ..
          # Stage first so we detect both modifications and new files (bootstrap case).
          git add web/public/manifest.json
          if git diff --cached --quiet -- web/public/manifest.json; then
            echo "Manifest unchanged — nothing to commit"
            exit 0
          fi
          git config user.name "ficha-etl-bot"
          git config user.email "ficha-etl-bot@users.noreply.github.com"
          git commit -m "chore(etl): update manifest for $MONTH"

          # ETL can run for hours — concurrent commits to main during that window
          # would make a plain push non-fast-forward. Rebase + retry.
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || {
              echo "::error::rebase conflict on attempt $attempt — aborting"
              git rebase --abort || true
              exit 1
            }
            if git push origin HEAD:main; then
              echo "Pushed manifest update on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt; retrying in $((attempt * 5))s"
            sleep $((attempt * 5))
          done
          echo "::error::failed to push manifest after 3 attempts"
          exit 1

      # skip_upload roda o transform/pack localmente pra teste (CLI), mas
      # build_snapshot_entry() gera URLs pelo padrão ia:ficha-<mês>/... sem
      # checar se algo foi de fato enviado — e verify_snapshot_files() só é
      # chamado quando o upload está ligado (ver _cmd_run). Sem este guard,
      # um dry-run comitaria em main um manifest apontando pra arquivos que
      # nunca existiram no IA (mesma classe de bug do 2026-04).
      - name: Dry-run summary
        if: >-
          steps.month.outputs.should_run == 'true' &&
          inputs.skip_upload == true
        run: |
          echo "::notice::Dry-run concluído: nenhum upload realizado e nenhuma alteração do manifesto será publicada."
