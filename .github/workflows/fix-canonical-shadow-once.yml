name: Fix Canonical Shadow Once

on:
  pull_request:
    paths:
      - '.github/workflows/fix-canonical-shadow-once.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Apply reviewed fixes and validate
        working-directory: etl
        run: |
          uv python install 3.11
          uv sync --extra dev
          uv run python - <<'PY'
          from pathlib import Path

          module = Path('src/ficha_etl/canonical_shadow.py')
          text = module.read_text()
          replacements = {
              'import sys\n': 'import sys\nimport uuid\n',
              "f\"WHERE {raw} IS NOT NULL AND TRIM({raw}) NOT IN ('', '0') \"":
                  "f\"WHERE {raw} IS NOT NULL AND TRIM({raw}) <> '' \"",
              'partial = output.with_name(f".{output.name}.partial")':
                  'partial = output.with_name(f".{output.name}.{uuid.uuid4().hex}.partial")',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'expected exactly one occurrence: {old!r}')
              text = text.replace(old, new)
          module.write_text(text)

          tests = Path('tests/test_canonical_shadow.py')
          text = tests.read_text()
          old = '"data_inicio_atividade": 0,'
          new = '"data_inicio_atividade": 1,'
          if text.count(old) != 1:
              raise SystemExit('expected invalid-cast assertion once')
          text = text.replace(old, new)
          old_partial = 'assert not output.with_name(f".{output.name}.partial").exists()'
          new_partial = 'assert not list(output.parent.glob(f".{output.name}.*.partial"))'
          if text.count(old_partial) != 2:
              raise SystemExit('expected two fixed-partial assertions')
          text = text.replace(old_partial, new_partial)
          tests.write_text(text)
          PY
          uv run ruff format src/ficha_etl/canonical_shadow.py tests/test_canonical_shadow.py
          uv run ruff check src/ficha_etl/canonical_shadow.py tests/test_canonical_shadow.py
          uv run pytest -q tests/test_canonical_shadow.py tests/test_canonical_registry.py
      - name: Commit reviewed fixes and remove one-shot workflow
        run: |
          rm .github/workflows/fix-canonical-shadow-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(etl): align shadow invalid counts and isolate partials'
          git push origin HEAD:${{ github.head_ref }}
