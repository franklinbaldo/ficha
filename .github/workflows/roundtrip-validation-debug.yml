name: Roundtrip Evidence Validation Debug

on:
  pull_request:
    paths:
      - '.github/workflows/roundtrip-validation-debug.yml'
      - '.github/workflows/etl-evidence.yml'
      - 'etl/bench/ab_verify_roundtrip.py'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: etl
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --extra dev
      - name: Ruff check
        run: |
          uv run ruff check \
            bench/ab_codecs.py \
            bench/ab_verify_roundtrip.py \
            bench/dedup_evidence.py \
            bench/run_with_peaks.py
      - name: Ruff format
        run: |
          uv run ruff format --check \
            bench/ab_codecs.py \
            bench/ab_verify_roundtrip.py \
            bench/dedup_evidence.py \
            bench/run_with_peaks.py
      - name: YAML parse
        run: |
          uv run python - <<'PY'
          import yaml
          from pathlib import Path
          yaml.safe_load(Path('../.github/workflows/etl-evidence.yml').read_text())
          PY
