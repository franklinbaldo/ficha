name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      # Expõe origin/base_path pro build gerar URLs corretas sob /ficha/
      # (project pages) ou domínio próprio. Pré-requisito: Pages habilitado
      # em Settings → Pages com source "GitHub Actions" (habilitar via
      # enablement: true exigiria PAT/GitHub App — o GITHUB_TOKEN não pode).
      - id: pages
        uses: actions/configure-pages@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build
        env:
          SITE: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Smoke test contra o site realmente publicado. Duas severidades,
  # espelhando o contrato real do frontend (SearchCNPJ.svelte):
  #   - erro:   página fora do ar, manifest inválido, cnpjs ou algum
  #             lookup indisponível — isso derruba a busca principal e
  #             o job precisa vermelho.
  #   - warning: socios/cnpj_contatos/cnpj_cnaes/enderecos/pessoas —
  #             o frontend já degrada essas seções isoladamente (init()
  #             segue até "Pronto para consultas" mesmo sem elas), então
  #             o site está no ar e funcional; um warning documenta o
  #             dataset incompleto sem bloquear o deploy.
  # Integridade completa do snapshot (todo arquivo declarado = todo
  # arquivo baixável) é responsabilidade do ETL antes de publicar o
  # manifest (ver manifest.verify_snapshot_files), não deste smoke.
  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test deployed site
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          BASE="${PAGE_URL%/}"
          echo "Verifying $BASE"

          code=$(curl -sS -o /dev/null -w '%{http_code}' -L "$BASE/")
          [ "$code" = "200" ] || { echo "::error::homepage → HTTP $code"; exit 1; }

          curl -sSfL "$BASE/manifest.json" -o manifest.json \
            || { echo "::error::manifest.json não publicado em $BASE/manifest.json"; exit 1; }

          CURRENT=$(jq -r '.current // ""' manifest.json)
          [ -n "$CURRENT" ] || { echo "::error::manifest.json sem campo 'current'"; exit 1; }
          echo "manifest OK — snapshot atual: $CURRENT"

          check_url() {
            local url="$1"
            local code
            code=$(curl -sS -o /dev/null -w '%{http_code}' -I -L --max-time 60 "$url")
            [ "$code" = "200" ]
          }

          # Essenciais: sem isso a busca principal (empresa por CNPJ/razão
          # social) não sobe. init() trata como fatal.
          ESSENTIAL=$(jq -r --arg m "$CURRENT" '
            .snapshots[] | select(.date == $m)
            | [.files.cnpjs.url, (.lookups[]?.url)] | .[]
          ' manifest.json)
          [ -n "$ESSENTIAL" ] || { echo "::error::nenhuma URL essencial encontrada pro mês $CURRENT"; exit 1; }

          fail=0
          while IFS= read -r url; do
            if check_url "$url"; then
              echo "OK   $url"
            else
              echo "::error::$url → indisponível (essencial)"
              fail=1
            fi
          done <<< "$ESSENTIAL"
          [ "$fail" = "0" ] || exit 1

          # Complementares: init() os anexa em try/catch isolado — ausência
          # não impede "Pronto para consultas", só desativa a seção
          # correspondente (sócios, contatos, CNAE, endereços, pessoas).
          COMPLEMENTARY=$(jq -r --arg m "$CURRENT" '
            .snapshots[] | select(.date == $m)
            | [
                (.files.socios.url // empty),
                (.files.cnpj_contatos.url // empty),
                (.files.cnpj_cnaes.url // empty),
                (.files.enderecos.url // empty),
                (.files.pessoas.url // empty)
              ]
            | .[]
          ' manifest.json)

          degraded=0
          while IFS= read -r url; do
            [ -n "$url" ] || continue
            if check_url "$url"; then
              echo "OK   $url"
            else
              echo "::warning::$url → indisponível (complementar — seção correspondente fica degradada no site)"
              degraded=1
            fi
          done <<< "$COMPLEMENTARY"

          if [ "$degraded" = "1" ]; then
            echo "site publicado com busca principal OK, mas com dataset(s) complementar(es) indisponível(is) — ver warnings acima"
          else
            echo "snapshot files OK — todos os arquivos alcançáveis"
          fi
