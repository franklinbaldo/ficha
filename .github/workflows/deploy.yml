name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      # Expõe origin/base_path pro build gerar URLs corretas sob /ficha/
      # (project pages) ou domínio próprio. Pré-requisito: Pages habilitado
      # em Settings → Pages com source "GitHub Actions" (habilitar via
      # enablement: true exigiria PAT/GitHub App — o GITHUB_TOKEN não pode).
      - id: pages
        uses: actions/configure-pages@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build
        env:
          SITE: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Smoke test contra o site realmente publicado: página no ar, manifest
  # válido e parquet do snapshot atual alcançável no Internet Archive.
  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test deployed site
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          BASE="${PAGE_URL%/}"
          echo "Verifying $BASE"

          code=$(curl -sS -o /dev/null -w '%{http_code}' -L "$BASE/")
          [ "$code" = "200" ] || { echo "::error::homepage → HTTP $code"; exit 1; }

          curl -sSfL "$BASE/manifest.json" -o manifest.json \
            || { echo "::error::manifest.json não publicado em $BASE/manifest.json"; exit 1; }

          CURRENT=$(jq -r '.current // ""' manifest.json)
          [ -n "$CURRENT" ] || { echo "::error::manifest.json sem campo 'current'"; exit 1; }
          echo "manifest OK — snapshot atual: $CURRENT"

          # Todos os arquivos que a inicialização do frontend carrega até
          # "Pronto para consultas": obrigatórios (cnpjs, socios,
          # cnpj_contatos), opcionais quando presentes no manifest
          # (cnpj_cnaes, enderecos, pessoas) e todos os parquets de lookup.
          # Qualquer um indisponível derruba o init inteiro no catch.
          URLS=$(jq -r --arg m "$CURRENT" '
            .snapshots[]
            | select(.date == $m)
            | [
                .files.cnpjs.url,
                .files.socios.url,
                (.files.cnpj_contatos.url // empty),
                (.files.cnpj_cnaes.url // empty),
                (.files.enderecos.url // empty),
                (.files.pessoas.url // empty),
                (.lookups[]?.url)
              ]
            | .[]
          ' manifest.json)
          [ -n "$URLS" ] || { echo "::error::nenhuma URL de snapshot encontrada pro mês $CURRENT"; exit 1; }

          while IFS= read -r url; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' -I -L --max-time 60 "$url")
            [ "$code" = "200" ] || { echo "::error::$url → HTTP $code"; exit 1; }
            echo "OK $url"
          done <<< "$URLS"
          echo "snapshot files OK — todos os arquivos exigidos pelo frontend alcançáveis"
