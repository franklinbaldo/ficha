name: ETL — bootstrap (first production snapshot)

# One-shot bootstrap of the first manifest.json. Triggers when the
# workflow file or any ETL source/test changes on the bootstrap branch
# (so a fix to upload.py / transform.py retriggers naturally), or
# manually via workflow_dispatch. The bot's [skip ci] manifest commit
# touches web/public/manifest.json, which is NOT in this list, so it
# doesn't loop.
on:
  push:
    branches: [claude/review-repo-planning-ApKX5]
    paths:
      - '.github/workflows/etl-bootstrap.yml'
      - 'etl/src/**'
      - 'etl/tests/**'
      - 'etl/pyproject.toml'
  workflow_dispatch:
    inputs:
      month:
        description: 'Snapshot alvo (YYYY-MM). Vazio = mês corrente.'
        required: false
        type: string
      skip_upload:
        description: 'Pular upload IA (dry-run, transform + verify apenas)'
        required: false
        type: boolean
        default: false
      no_verify:
        description: 'Desativar roundtrip-equivalence test'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

# Cancel any in-flight bootstrap when a new commit lands on the branch —
# avoids two ETL runs racing on the same Internet Archive item.
concurrency:
  group: etl-bootstrap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/powershell /usr/share/swift \
                      "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          df -h /

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        working-directory: etl
        run: uv python install 3.11

      - name: Install deps
        working-directory: etl
        run: uv sync --frozen

      # NB: deliberately no `actions/cache@v4` step for raw RFB ZIPs here
      # (etl-monthly.yml has one). Bootstrap is one-shot AND
      # disk-constrained -- the cnpjs.parquet join needs every spare GB
      # of the runner's ~70 GiB filesystem, and `FICHA_DROP_ZIPS_AFTER_LOAD=1`
      # below `unlink()`s the ZIPs mid-job to claim that headroom.
      # Cache+drop would defeat each other: post-step would find an
      # empty path and save nothing. Re-fetch from IA (~2 min) is cheap
      # enough that adding cache here would be net-negative for this
      # workflow specifically.

      - name: Resolve target month
        id: month
        working-directory: etl
        env:
          INPUT_MONTH: ${{ inputs.month }}
          CNPJ_SHARE_TOKEN: ${{ secrets.CNPJ_SHARE_TOKEN }}
        run: |
          set -x  # echo commands so we can see what list-snapshots actually returns
          # Resolution policy:
          # - INPUT_MONTH (operator-supplied): validated immediately; invalid
          #   means the operator made a typo and should know -- never silently
          #   coerced to a fallback.
          # - No INPUT_MONTH: query RFB list-snapshots with retries. Only if
          #   auto-resolution exhausts retries do we fall back to the
          #   hardcoded `2026-04` known-good month.
          MONTH=""
          if [ -n "$INPUT_MONTH" ]; then
            if [[ "$INPUT_MONTH" =~ ^[0-9]{4}-(0[1-9]|1[0-2])$ ]]; then
              MONTH="$INPUT_MONTH"
              echo "Using user-provided month: $MONTH"
            else
              echo "::error::Invalid INPUT_MONTH '$INPUT_MONTH' -- expected YYYY-MM"
              exit 1
            fi
          else
            DELAY=5
            for attempt in 1 2 3 4 5; do
              # Capture stderr alongside so failures are visible in the GHA log.
              # Wrap the entire pipeline in `set +e` -- grep -E exits 1 on
              # no-matches, which under bash -e -o pipefail (GHA default)
              # would kill the step before the retry loop and fallback can
              # run. We need the loop to handle "succeeded but produced no
              # YYYY-MM lines" as well as "process failed".
              set +e
              OUTPUT=$(uv run ficha-etl list-snapshots 2>&1)
              RC=$?
              MONTH=$(echo "$OUTPUT" | grep -E '^[0-9]{4}-(0[1-9]|1[0-2])$' | sort | tail -n 1)
              set -e
              echo "::group::list-snapshots attempt $attempt (rc=$RC, month='$MONTH')"
              echo "$OUTPUT"
              echo "::endgroup::"
              if [ $RC -eq 0 ] && [[ "$MONTH" =~ ^[0-9]{4}-(0[1-9]|1[0-2])$ ]]; then
                echo "Resolved on attempt $attempt: $MONTH"
                break
              fi
              MONTH=""  # reset before retry
              echo "list-snapshots attempt $attempt failed (rc=$RC); sleeping ${DELAY}s"
              sleep $DELAY
              DELAY=$((DELAY * 2))
            done
            if ! [[ "$MONTH" =~ ^[0-9]{4}-(0[1-9]|1[0-2])$ ]]; then
              echo "::warning::list-snapshots failed all retries; falling back to hardcoded 2026-04"
              MONTH="2026-04"
            fi
          fi
          echo "value=$MONTH" >> "$GITHUB_OUTPUT"
          echo "Final resolved month: $MONTH"

      - name: Run pipeline
        id: run
        working-directory: etl
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          CNPJ_SHARE_TOKEN: ${{ secrets.CNPJ_SHARE_TOKEN }}
          MONTH: ${{ steps.month.outputs.value }}
          SKIP_UPLOAD: ${{ inputs.skip_upload }}
          NO_VERIFY: ${{ inputs.no_verify }}
          # Force UTF-8 on stdout/stderr — runner locale can default to
          # ascii under `2>&1 | tee`, and a single em-dash in a log line
          # is enough to crash the pipeline with UnicodeEncodeError.
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
          # Bootstrap is one-shot and disk-constrained; reclaim ~7 GB of
          # raw ZIPs after they're loaded into DuckDB so phase 3 spill
          # has room. Monthly cron leaves this unset so its actions/cache
          # step keeps the ZIPs warm for next run's retry. See ADR 0008
          # / Codex P2 in PR #24.
          FICHA_DROP_ZIPS_AFTER_LOAD: '1'
        run: |
          set -o pipefail
          EXTRA_ARGS=""
          [ "$SKIP_UPLOAD" = "true" ] && EXTRA_ARGS="$EXTRA_ARGS --skip-upload"
          [ "$NO_VERIFY"   = "true" ] && EXTRA_ARGS="$EXTRA_ARGS --no-verify"
          uv run ficha-etl run --month "$MONTH" $EXTRA_ARGS 2>&1 | tee run.log

      - name: Verify IA item
        id: verify
        if: steps.run.outcome == 'success' && inputs.skip_upload != true
        env:
          MONTH: ${{ steps.month.outputs.value }}
        run: |
          set +e
          ITEM="ficha-${MONTH}"
          # IA metadata can lag uploads (eventual consistency, ~seconds)
          # AND archive.org/ has been intermittently 502/timing out for
          # extended windows (see PR #24 smoke-check failures). Exponential
          # backoff: 10, 20, 40, 80, 160s -- ~5 min total tolerance.
          rm -f /tmp/ia.json
          DELAY=10
          for attempt in 1 2 3 4 5; do
            if curl -fsS --max-time 30 "https://archive.org/metadata/${ITEM}" -o /tmp/ia.json; then
              break
            fi
            echo "metadata fetch attempt $attempt failed; sleeping ${DELAY}s"
            sleep $DELAY
            DELAY=$((DELAY * 2))
          done
          REPORT=$(python3 - <<'PY'
          import json, sys
          try:
              with open("/tmp/ia.json") as f:
                  d = json.load(f)
          except Exception as exc:
              print(f"failed to parse IA metadata: {exc}")
              sys.exit(1)
          files = d.get("files", []) or []
          raw = [f for f in files if f.get("name", "").startswith("raw/")]
          pq  = [f for f in files if f.get("name", "").endswith(".parquet")]
          lk  = [f for f in files if f.get("name") == "lookups.json"]
          total = sum(int(f.get("size", 0) or 0) for f in files)
          ident = d.get("metadata", {}).get("identifier", "?")
          ok = len(raw) == 37 and len(pq) >= 3 and len(lk) == 1
          print(f"identifier:  {ident}")
          print(f"raw zips:    {len(raw)}/37")
          print(f"parquets:    {len(pq)} (expect >=3: cnpjs, raizes, socios)")
          print(f"lookups:     {len(lk)}/1")
          print(f"total size:  {total:,} bytes ({total/1e9:.2f} GB)")
          print(f"verdict:     {'OK' if ok else 'INCOMPLETE'}")
          sys.exit(0 if ok else 1)
          PY
          )
          STATUS=$?
          {
            echo 'report<<RPT_EOF'
            echo "$REPORT"
            echo RPT_EOF
          } >> "$GITHUB_OUTPUT"
          echo "$REPORT"
          exit $STATUS

      - name: Capture log tail
        if: always()
        id: tail
        run: |
          {
            echo 'log<<TAIL_EOF'
            tail -c 12000 etl/run.log 2>/dev/null || echo '(no run.log produced)'
            echo TAIL_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Read manifest
        if: always()
        id: manifest
        run: |
          if [ -f web/public/manifest.json ]; then
            {
              echo 'body<<MAN_EOF'
              cat web/public/manifest.json
              echo MAN_EOF
            } >> "$GITHUB_OUTPUT"
          else
            echo 'body=(manifest.json not generated)' >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        # Advisory only — `Propagate pipeline failure` is the canonical
        # success/failure signal. A flaky GitHub comment API shouldn't
        # flip a clean bootstrap to red.
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          MONTH: ${{ steps.month.outputs.value }}
          OUTCOME: ${{ steps.run.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          VERIFY_REPORT: ${{ steps.verify.outputs.report }}
          LOG: ${{ steps.tail.outputs.log }}
          MANIFEST: ${{ steps.manifest.outputs.body }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });
            if (!prs.length) {
              core.warning(`No open PR for branch ${branch} — skipping comment`);
              return;
            }
            const runOk = process.env.OUTCOME === 'success';
            const verifyOutcome = process.env.VERIFY_OUTCOME || 'skipped';
            const verifyOk = verifyOutcome === 'success';
            const overallOk = runOk && (verifyOk || verifyOutcome === 'skipped');
            const icon = overallOk ? '✅' : '❌';
            const body = [
              `## ${icon} ETL bootstrap — \`${process.env.MONTH}\``,
              ``,
              `**Pipeline:** \`${process.env.OUTCOME}\` · **IA verify:** \`${verifyOutcome}\` · [run logs](${process.env.RUN_URL})`,
              ``,
              `<details${verifyOk ? '' : ' open'}><summary>IA item verification (archive.org/metadata)</summary>`,
              ``,
              '```',
              process.env.VERIFY_REPORT || '(verify did not run)',
              '```',
              ``,
              `</details>`,
              ``,
              `<details><summary>Pipeline log (last 12 KB)</summary>`,
              ``,
              '```',
              process.env.LOG || '(empty)',
              '```',
              ``,
              `</details>`,
              ``,
              `<details><summary>web/public/manifest.json</summary>`,
              ``,
              '```json',
              process.env.MANIFEST || '(missing)',
              '```',
              ``,
              `</details>`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prs[0].number,
              body,
            });

      - name: Commit manifest back to PR branch
        # always() bypasses the implicit success() gate so a flaky
        # Comment-on-PR step can't drop the bootstrap manifest. Verify
        # must succeed (not just be skipped) — `--skip-upload` is a
        # dry-run that still updates manifest.json locally, but its
        # IA URLs point at artifacts we never uploaded, so committing
        # would leave consumers chasing 404s.
        if: |
          always()
          && steps.run.outcome == 'success'
          && steps.verify.outcome == 'success'
        env:
          MONTH: ${{ steps.month.outputs.value }}
        run: |
          git add web/public/manifest.json
          if git diff --cached --quiet -- web/public/manifest.json; then
            echo "manifest unchanged — nothing to commit"
            exit 0
          fi
          git config user.name  "ficha-etl-bot"
          git config user.email "ficha-etl-bot@users.noreply.github.com"
          git commit -m "chore(etl): bootstrap manifest for $MONTH [skip ci]"

          # ETL ran for ~1 hour; concurrent commits on the PR branch
          # during that window would make a plain push non-fast-forward.
          # 3 attempts with rebase + exponential backoff, mirrors the
          # pattern in etl-monthly.yml's manifest-commit step.
          for attempt in 1 2 3; do
            git fetch origin "$GITHUB_REF_NAME"
            git rebase "origin/$GITHUB_REF_NAME" || {
              echo "::error::rebase conflict on attempt $attempt - aborting"
              git rebase --abort || true
              exit 1
            }
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Pushed manifest on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt; retrying in $((attempt * 5))s"
            sleep $((attempt * 5))
          done
          echo "::error::failed to push manifest after 3 attempts"
          exit 1

      - name: Propagate pipeline failure
        # always() ensures the failure signal isn't swallowed when an
        # earlier non-critical step (log tail, comment) also failed.
        # Either the pipeline failed or IA verification said incomplete.
        if: |
          always()
          && (
            steps.run.outcome != 'success'
            || (steps.verify.outcome != 'success' && steps.verify.outcome != 'skipped')
          )
        run: |
          echo "::error::ETL bootstrap failed - see PR comment + run logs"
          exit 1
