name: Canonical Shadow — historical simples dataset

on:
  workflow_dispatch:
    inputs:
      month:
        description: Historical IA snapshot (YYYY-MM)
        required: true
        default: '2026-04'
        type: string
      sample_size:
        description: Deterministic reversible sample size
        required: true
        default: '1000'
        type: string
  pull_request:
    paths:
      - '.github/workflows/canonical-simples-history.yml'
      - 'etl/src/ficha_etl/canonical_history_simples.py'
      - 'etl/src/ficha_etl/canonical_history.py'
      - 'etl/src/ficha_etl/canonical_shadow.py'
      - 'etl/src/ficha_etl/registry.py'
      - 'etl/src/ficha_etl/sources.py'
      - 'etl/tests/test_canonical_history_simples.py'

permissions:
  contents: read

concurrency:
  group: canonical-simples-history-${{ github.ref }}-${{ inputs.month || 'pr' }}
  cancel-in-progress: false

jobs:
  smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --frozen --extra dev

      - name: Build one offline simples fixture (exact dup, conflicting dup, malformed date)
        run: |
          uv run python - <<'PY'
          import csv
          import io
          import zipfile
          from pathlib import Path

          from ficha_etl import registry

          root = Path('.canonical-simples-smoke/fixtures')
          root.mkdir(parents=True, exist_ok=True)

          def row(**overrides):
              values = dict.fromkeys(registry.SIMPLES_COLUMNS, '')
              values.update(
                  cnpj_basico='00000001',
                  opcao_simples='S',
                  data_opcao_simples='20200115',
                  data_exclusao_simples='',
                  opcao_mei='N',
                  data_opcao_mei='',
                  data_exclusao_mei='',
              )
              values.update(overrides)
              return values

          def write_zip(path, rows):
              buffer = io.StringIO(newline='')
              writer = csv.writer(
                  buffer, delimiter=';', quotechar='"', quoting=csv.QUOTE_ALL, lineterminator='\n'
              )
              for r in rows:
                  writer.writerow([r[name] for name in registry.SIMPLES_COLUMNS])
              with zipfile.ZipFile(path, 'w', zipfile.ZIP_DEFLATED) as archive:
                  archive.writestr(
                      'K3241.K03200Y0.D60719.SIMPLES.CSV', buffer.getvalue().encode('latin-1')
                  )

          rows = [
              row(cnpj_basico='00000001'),
              row(cnpj_basico='00000001'),  # exact duplicate
              row(cnpj_basico='00000002', opcao_simples='CONFLICT_A'),
              row(cnpj_basico='00000002', opcao_simples='CONFLICT_B'),  # conflicting duplicate
              row(cnpj_basico='00000003', data_opcao_simples='not-a-date'),  # malformed date
          ]
          write_zip(root / 'Simples.zip', rows)
          PY

      - name: Run offline historical simples smoke
        run: |
          uv run python -m ficha_etl.canonical_history_simples \
            --month 2026-04 \
            --root .canonical-simples-smoke/run \
            --sample-size 10 \
            --zip "Simples.zip=.canonical-simples-smoke/fixtures/Simples.zip"

      - name: Validate manifest, deterministic collapse and typed dates
        run: |
          MANIFEST=.canonical-simples-smoke/run/evidence/simples.history.json
          jq -e '
            .status == "ok" and
            .table == "simples" and
            .month == "2026-04" and
            .source.name == "Simples.zip" and
            .source.acquisition == "local-override" and
            .quality_summary.rows_raw == 5 and
            .quality_summary.rows_canonical == 3 and
            .quality_summary.duplicate_key_count == 2 and
            .quality_summary.duplicate_key_rows == 2 and
            .quality_summary.conflicting_key_count == 1 and
            .quality_summary.conflicting_sample == [{"cnpj_basico": "00000002"}] and
            .quality_summary.invalid_casts_by_column.data_opcao_simples == 1 and
            .quality_summary.schema_matches == true and
            .quality_summary.sample_mismatches == 0 and
            .resource_summary.scope == "canonical-writer-stage" and
            .output.sha256 and .quality.sha256 and .metrics.sha256
          ' "$MANIFEST"

          uv run python - <<'PY'
          import datetime

          import duckdb

          con = duckdb.connect()
          rows = con.execute(
              "SELECT cnpj_basico, opcao_simples, data_opcao_simples, _source_file FROM "
              "read_parquet('.canonical-simples-smoke/run/canonical/simples.parquet')"
          ).fetchall()
          described = con.execute(
              "DESCRIBE SELECT * FROM "
              "read_parquet('.canonical-simples-smoke/run/canonical/simples.parquet')"
          ).fetchall()
          con.close()

          assert len(rows) == 3, rows
          # Explicit primary-key ordering (no ORDER BY in this query).
          assert [r[0] for r in rows] == ["00000001", "00000002", "00000003"], rows
          # Deterministic conflict survivor: "CONFLICT_A" < "CONFLICT_B".
          assert rows[1] == ("00000002", "CONFLICT_A", datetime.date(2020, 1, 15), "Simples.zip"), rows[1]
          # _source_file contains only the one expected source name.
          assert {r[3] for r in rows} == {"Simples.zip"}
          types = {name: dtype for name, dtype, *_ in described}
          assert types["data_opcao_simples"] == "DATE", types
          assert types["cnpj_basico"] == "VARCHAR", types
          print("deterministic collapse, ordering, typed dates and lineage OK")
          PY

      - name: Validate invalid/missing override fails closed without network
        run: |
          set +e
          uv run python -m ficha_etl.canonical_history_simples \
            --month 2026-04 \
            --root .canonical-simples-smoke/run-missing \
            --zip "Simples.zip=.canonical-simples-smoke/fixtures/does-not-exist.zip"
          missing_status=$?

          echo "not a zip" > .canonical-simples-smoke/fixtures/not-a-zip.zip
          uv run python -m ficha_etl.canonical_history_simples \
            --month 2026-04 \
            --root .canonical-simples-smoke/run-invalid \
            --zip "Simples.zip=.canonical-simples-smoke/fixtures/not-a-zip.zip"
          invalid_status=$?

          uv run python -m ficha_etl.canonical_history_simples \
            --month 2026-04 \
            --root .canonical-simples-smoke/run-wrong-name \
            --zip "Empresas0.zip=.canonical-simples-smoke/fixtures/Simples.zip"
          wrong_name_status=$?
          set -e

          if [ "$missing_status" -eq 0 ] || [ "$invalid_status" -eq 0 ] || [ "$wrong_name_status" -eq 0 ]; then
            echo "::error::runner accepted a missing/invalid/misnamed override -- must fail closed"
            exit 1
          fi
          echo "confirmed: missing ($missing_status), invalid ($invalid_status) and misnamed ($wrong_name_status) overrides all fail closed"

  historical:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: etl
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        id: inputs
        env:
          INPUT_MONTH: ${{ inputs.month }}
          INPUT_SAMPLE_SIZE: ${{ inputs.sample_size }}
        run: |
          if ! [[ "$INPUT_MONTH" =~ ^[0-9]{4}-(0[1-9]|1[0-2])$ ]]; then
            echo "::error::Invalid month '$INPUT_MONTH' — expected YYYY-MM"
            exit 2
          fi
          if ! [[ "$INPUT_SAMPLE_SIZE" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid sample_size '$INPUT_SAMPLE_SIZE' — expected a non-negative integer"
            exit 2
          fi
          echo "month=$INPUT_MONTH" >> "$GITHUB_OUTPUT"
          echo "sample_size=$INPUT_SAMPLE_SIZE" >> "$GITHUB_OUTPUT"
          echo "root=.canonical-simples-history/$INPUT_MONTH" >> "$GITHUB_OUTPUT"

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/powershell /usr/share/swift \
                      "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          df -h /

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --frozen

      - name: Run historical canonical simples dataset
        env:
          MONTH: ${{ steps.inputs.outputs.month }}
          SAMPLE_SIZE: ${{ steps.inputs.outputs.sample_size }}
          ROOT: ${{ steps.inputs.outputs.root }}
        run: |
          df -h /
          uv run python -m ficha_etl.canonical_history_simples \
            --month "$MONTH" \
            --root "$ROOT" \
            --sample-size "$SAMPLE_SIZE"
          df -h /

      - name: Write summary
        if: always()
        env:
          ROOT: ${{ steps.inputs.outputs.root }}
        run: |
          MANIFEST="$ROOT/evidence/simples.history.json"
          FAILURE="$ROOT/evidence/simples.history.failure.json"
          {
            echo "## Historical canonical simples dataset"
            echo
            if [ -f "$MANIFEST" ]; then
              jq -r '
                "- Status: `" + .status + "`",
                "- Snapshot: `" + .month + "`",
                "- Source commit / run: `" + (.source_commit // "n/a") + "` / `" + (.workflow_run_id | tostring) + "`",
                "- Rows raw / canonical: `" + (.quality_summary.rows_raw|tostring) + "` / `" + (.quality_summary.rows_canonical|tostring) + "`",
                "- Duplicate keys / excess rows: `" + (.quality_summary.duplicate_key_count|tostring) + "` / `" + (.quality_summary.duplicate_key_rows|tostring) + "`",
                "- Conflicting keys: `" + (.quality_summary.conflicting_key_count|tostring) + "`",
                "- Required-key failures: `" + (.quality_summary.required_key_failures|tostring) + "`",
                "- Schema match: `" + (.quality_summary.schema_matches|tostring) + "`",
                "- Sample mismatches (n=" + (.quality_summary.sample_size|tostring) + "): `" + (.quality_summary.sample_mismatches|tostring) + "`",
                "- Output: `" + (.output.bytes|tostring) + " bytes`, sha256 `" + .output.sha256 + "`",
                "- Canonical writer stage wall time (NOT total job time -- see the job duration in the Actions UI for that): `" + (.resource_summary.wall_seconds|tostring) + "s`",
                "- RSS peak: `" + (.resource_summary.rss_peak_mib|tostring) + " MiB`, filesystem peak: `" + (.resource_summary.filesystem_used_peak_percent|tostring) + "%`"
              ' "$MANIFEST"
            elif [ -f "$FAILURE" ]; then
              jq -r '
                "- Status: `" + .status + "`",
                "- Snapshot: `" + .month + "`",
                "- Error: `" + .error + "`"
              ' "$FAILURE"
            else
              echo "- No orchestration manifest was produced."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload canonical dataset and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-simples-history-${{ steps.inputs.outputs.month }}-${{ github.run_id }}
          path: |
            etl/${{ steps.inputs.outputs.root }}/canonical/
            etl/${{ steps.inputs.outputs.root }}/evidence/
          if-no-files-found: warn
          retention-days: 30
          include-hidden-files: true
