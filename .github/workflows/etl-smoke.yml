name: ETL — RFB source smoke check

on:
  pull_request:
    paths:
      - 'etl/**'
      - '.github/workflows/etl-smoke.yml'
  schedule:
    # Toda segunda 06:00 UTC. Detecta mudança de URL/disponibilidade do RFB
    # antes do cron mensal de fato rodar.
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      month:
        description: 'YYYY-MM (vazio = mês anterior, mais provável de estar publicado)'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write  # for comment-on-PR debug output

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv python install 3.11

      - run: uv sync

      - name: Validate input month (when provided)
        id: month
        env:
          INPUT_MONTH: ${{ inputs.month }}
        run: |
          if [ -n "$INPUT_MONTH" ]; then
            if ! [[ "$INPUT_MONTH" =~ ^[0-9]{4}-(0[1-9]|1[0-2])$ ]]; then
              echo "::error::Invalid month '$INPUT_MONTH' — expected YYYY-MM"
              exit 1
            fi
          fi
          # When unset, the smoke command auto-discovers the latest available
          # month — robust to RFB publication delays.
          echo "value=$INPUT_MONTH" >> "$GITHUB_OUTPUT"

      - name: Run smoke check
        id: smoke
        env:
          MONTH: ${{ steps.month.outputs.value }}
        run: |
          MONTH_ARG=()
          if [ -n "$MONTH" ]; then
            MONTH_ARG=(--month "$MONTH")
            HEADER="## Smoke check — \`$MONTH\`"
          else
            HEADER="## Smoke check — auto-discover"
          fi
          {
            echo "$HEADER"
            echo ""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          uv run ficha-etl smoke "${MONTH_ARG[@]}" 2>&1 | tee smoke-output.txt | tee -a "$GITHUB_STEP_SUMMARY"
          rc=${PIPESTATUS[0]}
          {
            echo '```'
            echo ""
            echo "Exit code: \`$rc\`"
          } >> "$GITHUB_STEP_SUMMARY"
          {
            echo 'output<<SMOKE_EOF'
            cat smoke-output.txt
            echo 'SMOKE_EOF'
          } >> "$GITHUB_OUTPUT"
          exit "$rc"

      - name: Comment debug output on PR (failure only)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.smoke.outputs.output }}`;
            const month = `${{ steps.month.outputs.value }}`;
            const body = [
              `### 🔥 Smoke check failed for \`${month}\``,
              '',
              '<details><summary>Output</summary>',
              '',
              '```',
              output,
              '```',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
