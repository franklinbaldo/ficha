name: ETL — RFB source smoke check

on:
  pull_request:
    paths:
      - 'etl/**'
      - '.github/workflows/etl-smoke.yml'
  schedule:
    # Toda segunda 06:00 UTC. Detecta mudança de URL/disponibilidade do RFB
    # antes do cron mensal de fato rodar.
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      month:
        description: 'YYYY-MM (vazio = mês anterior, mais provável de estar publicado)'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write  # for comment-on-PR debug output

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv python install 3.11

      - run: uv sync

      - name: Resolve target month
        id: month
        # Default = mês anterior. RFB publica entre dias 1-5 do mês corrente
        # referente ao mês anterior — então o anterior é sempre o mais recente
        # disponível com confiança.
        env:
          INPUT_MONTH: ${{ inputs.month }}
        run: |
          if [ -n "$INPUT_MONTH" ]; then
            MONTH="$INPUT_MONTH"
          else
            # Use o dia 15 pra evitar drift de timezone perto da virada de mês.
            MONTH=$(date -u -d "$(date -u +%Y-%m-15) -1 month" +%Y-%m)
          fi
          if ! [[ "$MONTH" =~ ^[0-9]{4}-(0[1-9]|1[0-2])$ ]]; then
            echo "::error::Invalid month '$MONTH' — expected YYYY-MM"
            exit 1
          fi
          echo "Resolved target month: $MONTH"
          echo "value=$MONTH" >> "$GITHUB_OUTPUT"

      - name: Run smoke check
        id: smoke
        env:
          MONTH: ${{ steps.month.outputs.value }}
        run: |
          {
            echo "## Smoke check — \`$MONTH\`"
            echo ""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          uv run ficha-etl smoke --month "$MONTH" 2>&1 | tee smoke-output.txt | tee -a "$GITHUB_STEP_SUMMARY"
          rc=${PIPESTATUS[0]}
          {
            echo '```'
            echo ""
            echo "Exit code: \`$rc\`"
          } >> "$GITHUB_STEP_SUMMARY"
          # Save output for the next step regardless of pass/fail.
          {
            echo 'output<<SMOKE_EOF'
            cat smoke-output.txt
            echo 'SMOKE_EOF'
          } >> "$GITHUB_OUTPUT"
          exit "$rc"

      - name: Comment debug output on PR (failure only)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.smoke.outputs.output }}`;
            const month = `${{ steps.month.outputs.value }}`;
            const body = [
              `### 🔥 Smoke check failed for \`${month}\``,
              '',
              '<details><summary>Output</summary>',
              '',
              '```',
              output,
              '```',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
