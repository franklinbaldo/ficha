name: ETL — upstream + mirror smoke check

on:
  pull_request:
    paths:
      - 'etl/**'
      - '.github/workflows/etl-smoke.yml'
  schedule:
    # Toda segunda 06:00 UTC. Detecta mudança de URL/disponibilidade da RFB
    # antes do cron mensal de fato rodar.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write  # for comment-on-PR debug output

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4

      # Atualidade faz parte do produto: se o cron mensal falhar em silêncio,
      # este check semanal fica vermelho em vez de deixar a base envelhecer
      # despercebida (2026-04 ficou como current até julho sem nenhum alerta).
      - name: Check manifest freshness
        working-directory: .
        run: |
          python3 - <<'EOF'
          import datetime, json, sys

          manifest = json.load(open("web/public/manifest.json"))
          current = manifest.get("current", "")
          if not current:
              print("::error::manifest.json sem campo 'current'")
              sys.exit(1)

          year, month = map(int, current.split("-"))
          today = datetime.date.today()
          lag = (today.year - year) * 12 + (today.month - month)
          print(f"snapshot atual: {current} — {lag} mês(es) atrás de {today:%Y-%m}")

          # RFB publica o mês M durante o próprio M (às vezes M+1), e o cron
          # roda dia 5 — lag saudável é 0-1, e 2 é tolerável no começo do mês.
          if lag >= 3:
              print(f"::error::Snapshot {current} está {lag} meses atrasado — o cron mensal (etl-monthly) provavelmente está falhando. Verifique as últimas execuções e rode com inputs.month se necessário.")
              sys.exit(1)
          if lag == 2:
              print(f"::warning::Snapshot {current} está 2 meses atrás do calendário — verifique se o próximo cron mensal roda com sucesso.")
          EOF

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv python install 3.11

      - run: uv sync

      - name: Run smoke check
        id: smoke
        run: |
          {
            echo "## ETL smoke check"
            echo ""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          uv run ficha-etl smoke 2>&1 | tee smoke-output.txt | tee -a "$GITHUB_STEP_SUMMARY"
          rc=${PIPESTATUS[0]}
          {
            echo '```'
            echo ""
            echo "Exit code: \`$rc\`"
          } >> "$GITHUB_STEP_SUMMARY"
          {
            echo 'output<<SMOKE_EOF'
            cat smoke-output.txt
            echo 'SMOKE_EOF'
          } >> "$GITHUB_OUTPUT"
          exit "$rc"

      - name: Comment debug output on PR (failure only)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.smoke.outputs.output }}`;
            const body = [
              `### 🔥 Smoke check failed`,
              '',
              '<details><summary>Output</summary>',
              '',
              '```',
              output,
              '```',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
