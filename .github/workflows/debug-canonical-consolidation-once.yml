name: Debug Canonical Consolidation Once

on:
  pull_request:
    paths:
      - '.github/workflows/debug-canonical-consolidation-once.yml'

permissions:
  contents: write

jobs:
  debug:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Generate and preserve diagnostics
        working-directory: etl
        run: |
          uv python install 3.11
          uv sync --extra dev
          uv run python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('../.github/workflows/consolidate-canonical-shadow-once.yml').read_text()
          start = workflow.index("          uv run python - <<'PY'\n") + len(
              "          uv run python - <<'PY'\n"
          )
          end = workflow.index("\n          PY\n", start)
          Path('/tmp/consolidate.py').write_text(textwrap.dedent(workflow[start:end]))
          PY
          set +e
          uv run python /tmp/consolidate.py > consolidation-script.log 2>&1
          script_status=$?
          uv run python -m py_compile src/ficha_etl/canonical.py tests/test_canonical_part.py \
            > consolidation-compile.log 2>&1
          compile_status=$?
          uv run ruff format src/ficha_etl/canonical.py tests/test_canonical_part.py \
            > consolidation-format.log 2>&1
          format_status=$?
          uv run ruff check src/ficha_etl/canonical.py tests/test_canonical_part.py \
            > consolidation-ruff.log 2>&1
          ruff_status=$?
          printf 'script=%s\ncompile=%s\nformat=%s\nruff=%s\n' \
            "$script_status" "$compile_status" "$format_status" "$ruff_status" \
            > consolidation-status.txt
          cat consolidation-status.txt
      - name: Commit generated state and logs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore(etl): expose canonical consolidation diagnostics'
          git push origin HEAD:${{ github.head_ref }}
