name: Format Roundtrip Benchmark Once

on:
  pull_request:
    paths:
      - '.github/workflows/format-roundtrip-once.yml'
      - 'etl/bench/ab_verify_roundtrip.py'

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - working-directory: etl
        run: |
          uv python install 3.11
          uv sync --extra dev
          uv run ruff format bench/ab_verify_roundtrip.py
      - name: Commit formatter output
        run: |
          if git diff --quiet -- etl/bench/ab_verify_roundtrip.py; then
            echo 'already formatted'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add etl/bench/ab_verify_roundtrip.py
          git commit -m 'style(bench): apply pinned Ruff formatter'
          git push origin HEAD:${{ github.head_ref }}
